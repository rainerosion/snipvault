name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        type: string

# Only run one at a time to avoid duplicate releases
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write


jobs:
  # ─── Windows x64 ───────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --version=3.14.1 -y --allow-downgrade
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (!(Test-Path $wixPath)) {
            throw "WiX path not found: $wixPath"
          }
          "TAURI_BUNDLER_WIX_PATH=$wixPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Tauri (Windows MSI + NSIS)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Prepare portable executable
        shell: pwsh
        run: |
          $portableDir = "src-tauri/target/release/bundle/portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          if (Test-Path "src-tauri/target/release/snipvault.exe") {
            Copy-Item "src-tauri/target/release/snipvault.exe" "$portableDir/SnipVault-portable.exe" -Force
          } elseif (Test-Path "src-tauri/target/release/SnipVault.exe") {
            Copy-Item "src-tauri/target/release/SnipVault.exe" "$portableDir/SnipVault-portable.exe" -Force
          } else {
            throw "Portable executable not found in src-tauri/target/release"
          }

      - name: Upload Windows artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/portable/*.exe
          if-no-files-found: warn
          retention-days: 5

  # ─── macOS Universal (Intel + Apple Silicon) ───────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (macOS DMG + APP)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload macOS artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/app/*.app
          if-no-files-found: warn
          retention-days: 5

  # ─── Linux amd64 (deb + AppImage) ───────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (Linux deb + AppImage)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload Linux artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: |
            src-tauri/target/release/bundle/deb/**/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 5

  # ─── Publish Release ─────────────────────────────────────────────────────────
  publish:
    needs: [build-windows, build-macos, build-linux]
    if: ${{ always() && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success' || needs.build-linux.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Resolve release version
        id: version
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$REF_TYPE" = "tag" ] && [ -n "$REF_NAME" ]; then
            VERSION="$REF_NAME"
          elif [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            echo "No tag ref or workflow_dispatch input version provided."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: '灵藏 SnipVault ${{ steps.version.outputs.version }}'
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/SnipVault-portable.exe
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
